<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#f7faff" />
    <meta name="description" content="Googleスプレッドシートと連携する学校向け週間時間割" />
    <title>時間割</title>
    <link rel="stylesheet" href="./styles.css?v=20260610-6" />
    <script src="./config.js?v=20260610-6"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="./app.js?v=20260610-6" type="module"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow" id="class-name">1年A組</p>
          <h1 id="app-title">時間割</h1>
          <p class="week-range" id="week-range"></p>
        </div>

        <div class="header-actions">
          <button class="refresh-button" id="refresh-button" type="button">
            更新
          </button>
          <button class="account-button" id="account-button" type="button" aria-label="Googleアカウント">
            <span id="account-initial">G</span>
            <img id="account-image" alt="" hidden />
          </button>
        </div>
      </header>

      <section class="notice" id="notice" hidden aria-live="polite"></section>

      <nav class="week-navigation" aria-label="表示する週">
        <button id="previous-week" type="button">前の週</button>
        <strong id="week-label">今週</strong>
        <button id="next-week" type="button">次の週</button>
      </nav>

      <section class="timetable-section" aria-label="週間時間割">
        <div class="timetable-scroll">
          <div class="timetable" id="timetable"></div>
        </div>
      </section>

      <footer class="app-footer">
        <div class="status-line">
          <span class="status-label">最終更新</span>
          <time id="last-updated">未取得</time>
        </div>
        <div class="permission-line">
          <strong>閲覧のみ</strong>
          <span id="data-source">サンプル時間割を表示しています</span>
        </div>
        <button class="sign-in-button" id="sign-in-button" type="button">
          Googleでログイン
        </button>
      </footer>
    </main>

    <dialog class="lesson-detail" id="lesson-detail">
      <div class="lesson-detail-panel">
        <div>
          <p class="lesson-detail-label">授業内容</p>
          <h2 id="detail-title"></h2>
          <p id="detail-content"></p>
        </div>
        <button id="detail-close" type="button">閉じる</button>
      </div>
    </dialog>

    <div class="loading-overlay" id="loading-overlay" hidden>
      <div class="loading-panel" role="status">
        <span class="spinner" aria-hidden="true"></span>
        <span>時間割を取得しています</span>
      </div>
    </div>
  </body>
</html>
